name: Build MeloNX iOS (TrollStore)

on:
  workflow_dispatch:

jobs:
  build_ios:
    name: Build iOS IPA
    runs-on: macos-15
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          lfs: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Build Native Ryujinx dylib
        run: |
          chmod +x distribution/ios/get_dotnet.sh
          chmod +x distribution/ios/xc-compile.sh
          ./distribution/ios/xc-compile.sh
          ls -la "src/MeloNX/MeloNX/Dependencies/Dynamic Libraries"
          test -f "src/MeloNX/MeloNX/Dependencies/Dynamic Libraries/Ryujinx.Headless.SDL2.dylib"

      - name: Build Xcode Project
        run: |
          set -o pipefail
          mkdir -p build
          cd src/MeloNX
          xcodebuild archive -project MeloNX.xcodeproj -scheme MeloNX -configuration Release -destination "generic/platform=iOS" -archivePath ../../build/MeloNX.xcarchive CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO | tee ../../build/xcodebuild.log

      - name: Show Build Errors
        if: failure()
        run: |
          if [ -f build/xcodebuild.log ]; then
            echo "Showing first 120 xcodebuild error lines:"
            grep -n " error:" build/xcodebuild.log | head -n 120 || true
            echo "Showing undefined symbol section (if present):"
            grep -nE "Undefined symbols for architecture|referenced from:|symbol\(s\) not found for architecture" build/xcodebuild.log | head -n 200 || true
          fi

      - name: Package to IPA
        run: |
          mkdir -p Payload
          cp -r build/MeloNX.xcarchive/Products/Applications/MeloNX.app Payload/
          zip -r9 MeloNX-Air5-Optimized.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MeloNX-Air5-Optimized
          path: MeloNX-Air5-Optimized.ipa

      - name: Upload Build Log Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: build/xcodebuild.log
          if-no-files-found: ignore
